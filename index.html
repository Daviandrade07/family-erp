<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/kinfin/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="ERP doméstico inteligente: finanças da família, despensa, compras e assistente com IA.">
  <meta name="theme-color" content="#09090B">

  <!-- iOS / instalar na tela inicial -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kinfin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Kinfin</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body { background-color: #09090B; margin: 0; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: #09090B; color: #F4F4F5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #loading .dot {
      width: 46px; height: 46px; border-radius: 14px;
      background: linear-gradient(135deg, #00E676, #3D8BFF);
      animation: pulse 1s ease-in-out infinite alternate;
    }
    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.12); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="dot"></div>
    <div>Kinfin</div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) el.remove();
    });

    // Auto-atualização do PWA: garante que ninguém fique preso numa versão
    // antiga em cache (era o que impedia novos usuários de entrar). Ao detectar
    // um novo service worker instalado, ativa e recarrega uma vez.
    (function () {
      if (!('serviceWorker' in navigator)) return;
      var reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (reloaded) return;
        reloaded = true;
        window.location.reload();
      });
      function checkForUpdate() {
        navigator.serviceWorker.getRegistration().then(function (reg) {
          if (!reg) return;
          reg.update();
          if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          reg.addEventListener('updatefound', function () {
            var nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', function () {
              if (nw.state === 'installed') {
                nw.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });
        });
      }
      window.addEventListener('load', checkForUpdate);
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') checkForUpdate();
      });
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
